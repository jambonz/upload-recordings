name: Build Debian Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from git
        id: version
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "0.0.1")
          # Remove leading 'v' if present
          VERSION=${VERSION#v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Update debian changelog
        run: |
          cat > debian/changelog << EOF
          upload-recordings (${{ steps.version.outputs.VERSION }}) unstable; urgency=medium

            * Release ${{ steps.version.outputs.VERSION }}

           -- Dave Horton <daveh@beachdognet.com>  $(date -R)
          EOF

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            devscripts \
            debhelper \
            autoconf \
            automake \
            cmake \
            git \
            pkg-config \
            libcjson-dev \
            libmp3lame-dev \
            libmysqlcppconn-dev \
            libspdlog-dev \
            libfmt-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libgoogle-perftools-dev \
            libboost-all-dev \
            libev-dev

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Prepare artifacts
        run: |
          cp ../upload-recordings*.deb .
          ls -la upload-recordings*.deb

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: upload-recordings_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
